<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - FixHome</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login-styles.css">
</head>
<body>

<div class="login-container">
  <div class="logo-section">
    <a href="index.html">
      <img src="https://uqcjajmqtlchftpqwsrp.supabase.co/storage/v1/object/public/ssss/FixHouse-logo.png" alt="FixHome">
    </a>
  </div>

  <h1>🔐 เข้าสู่ระบบ</h1>
  <p>กรุณากรอกอีเมลและรหัสผ่านของคุณ</p>

  <div class="error-message" id="errorMessage"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">📧 อีเมล *</label>
      <input 
        type="email" 
        id="email" 
        placeholder="example@email.com" 
        required 
        autocomplete="email"
      >
    </div>

    <div class="form-group">
      <label for="password">🔒 รหัสผ่าน *</label>
      <input 
        type="password" 
        id="password" 
        placeholder="กรอกรหัสผ่าน" 
        required
        autocomplete="current-password"
      >
    </div>

    <button type="submit" class="btn-login" id="loginBtn">เข้าสู่ระบบ</button>
  </form>

  <div class="divider">หรือ</div>

  <a href="signup.html" class="btn-signup">สมัครลูกค้า 👤</a>
  <a href="Apply.html" class="btn-signup">สมัครเป็นช่าง 🔧</a>

  <div class="back-link">
    <a href="index.html">← กลับไปหน้าแรก</a>
  </div>
</div>

<script src="login.js" defer></script>
</body>
</html>
