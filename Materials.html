<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์รวมร้านวัสดุก่อสร้าง</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-orange-600 text-white p-6 shadow-md">
        <div class="container mx-auto flex flex-col md:flex-row gap-4 justify-between items-center">
            <h1 class="text-2xl font-bold">BuildMart Hub</h1>

            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <input id="searchInput" type="text" placeholder="ค้นหาชื่อร้าน..." class="px-4 py-2 rounded-lg text-gray-800 focus:outline-none w-full md:w-48">
                <input id="subdistrictInput" type="text" placeholder="ตำบล" class="px-4 py-2 rounded-lg text-gray-800 focus:outline-none w-full md:w-40">
                <input id="districtInput" type="text" placeholder="อำเภอ" class="px-4 py-2 rounded-lg text-gray-800 focus:outline-none w-full md:w-40">
                <input id="provinceInput" type="text" placeholder="จังหวัด" class="px-4 py-2 rounded-lg text-gray-800 focus:outline-none w-full md:w-40">
                <button onclick="searchShops()" class="bg-white text-orange-600 px-4 py-2 rounded-lg font-semibold hover:bg-orange-100 transition">ค้นหา</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-10 px-4">
        <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">ร้านวัสดุแนะนำใกล้คุณ</h2>
        <div id="shopContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-8 mt-20">
        <div class="container mx-auto text-center">
            <p>&copy; 2026 BuildMart Hub. All rights reserved.</p>
        </div>
    </footer>

<script>
    const supabaseUrl = "https://uqcjajmqtlchftpqwsrp.supabase.co";
    const supabaseKey = "sb_publishable_yWZiH8l1idY0QWGuj6p9sg_GqXPONGX";

    const { createClient } = supabase;
    const db = createClient(supabaseUrl, supabaseKey);

    const shopContainer = document.getElementById("shopContainer");

    async function loadShops(filters = {}) {
        let query = db.from("shops").select("*");

        if (filters.name) query = query.ilike("name", `%${filters.name}%`);
        if (filters.subdistrict) query = query.ilike("subdistrict", `%${filters.subdistrict}%`);
        if (filters.district) query = query.ilike("district", `%${filters.district}%`);
        if (filters.province) query = query.ilike("province", `%${filters.province}%`);

        const { data, error } = await query;

        if (error) {
            console.error("Error loading shops:", error);
            return;
        }

        shopContainer.innerHTML = "";

        if (!data || data.length === 0) {
            shopContainer.innerHTML = `<p class="col-span-3 text-center text-gray-500">ไม่พบร้านค้า</p>`;
            return;
        }

        data.forEach(shop => {
            const statusBadge = shop.is_open
                ? `<span class="bg-green-100 text-green-600 text-xs px-2 py-1 rounded">เปิดอยู่</span>`
                : `<span class="bg-red-100 text-red-600 text-xs px-2 py-1 rounded">ปิดแล้ว</span>`;

            const websiteButton = shop.website_url
                ? `<a href="${shop.website_url}" target="_blank" class="block w-full mt-4 bg-orange-500 text-white text-center py-2 rounded-lg hover:bg-orange-600 transition">เข้าสู่เว็บไซต์ร้าน</a>`
                : `<button class="w-full mt-4 bg-gray-400 text-white py-2 rounded-lg cursor-not-allowed">ไม่มีเว็บไซต์</button>`;

            shopContainer.innerHTML += `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition duration-300">
                    <div class="h-48 bg-gray-300 flex items-center justify-center">
                        ${shop.image_url
                            ? `<img src="${shop.image_url}" class="w-full h-full object-cover">`
                            : `<span class="text-gray-500">ไม่มีรูปภาพ</span>`}
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl font-bold text-gray-800">${shop.name}</h3>
                            ${statusBadge}
                        </div>
                        <p class="text-gray-600 text-sm mb-4">${shop.description || "-"}</p>
                        <div class="border-t pt-4 text-sm text-gray-500 space-y-1">
                            <p>📍 ${shop.subdistrict || ""} ${shop.district || ""} ${shop.province || ""}</p>
                            <p>🚚 พื้นที่ให้บริการ: ${shop.service_area || "ไม่ระบุ"}</p>
                            <p>📞 ${shop.phone || "-"}</p>
                        </div>
                        ${websiteButton}
                    </div>
                </div>
            `;
        });
    }

    function searchShops() {
        const filters = {
            name: document.getElementById("searchInput").value,
            subdistrict: document.getElementById("subdistrictInput").value,
            district: document.getElementById("districtInput").value,
            province: document.getElementById("provinceInput").value
        };

        loadShops(filters);
    }

    loadShops();
</script>

</body>
</html>
